version: '3.9'

# ─── Ghost Developer Studio — Staging overlay ──────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Changes from base:
#   - Uses versioned image tags from registry instead of local builds
#   - Enables structured JSON logging
#   - Limits resource usage to protect shared staging infra
#   - Adds CORS_ORIGIN restriction
#   - Adds SENTRY_DSN for error tracking (staging DSN)

services:
  server:
    image: ${REGISTRY:-ghcr.io/ghost-developer-studio}/server:${IMAGE_TAG:-staging}
    build: ~  # Override: use pre-built image
    environment:
      NODE_ENV: staging
      LOG_LEVEL: info
      CORS_ORIGIN: ${STAGING_WEB_URL:-https://staging.ghostdev.studio}
      SENTRY_DSN: ${STAGING_SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: always

  web:
    image: ${REGISTRY:-ghcr.io/ghost-developer-studio}/web:${IMAGE_TAG:-staging}
    build: ~
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_WS_URL: ${STAGING_WS_URL:-wss://staging-api.ghostdev.studio}
      NEXT_PUBLIC_API_URL: ${STAGING_API_URL:-https://staging-api.ghostdev.studio}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data

  redis:
    volumes:
      - staging_redis_data:/data

volumes:
  staging_postgres_data:
    name: ghost_staging_postgres_data
  staging_redis_data:
    name: ghost_staging_redis_data
