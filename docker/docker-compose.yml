version: '3.9'

# ─── Ghost Developer Studio — Docker Compose ──────────────────────────────────
# Services: postgres, redis, server, web
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose up -d postgres redis  # Start only infra
#   docker-compose logs -f server        # Follow server logs

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ghost_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghost
      POSTGRES_DB: ghost_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ghost -d ghost_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghost_network

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ghost_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ghost_network

  # ─── Ghost Server ────────────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: ghost_server
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ghost:ghost@postgres:5432/ghost_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_a_long_random_secret}
      JWT_EXPIRES_IN: 7d
      DOCKER_HOST: unix:///var/run/docker.sock
      RUNTIME_NETWORK: ghost_runtime
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ghost_network
      - ghost_runtime

  # ─── Ghost Web App ───────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: ghost_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - server
    networks:
      - ghost_network

volumes:
  postgres_data:
    name: ghost_postgres_data
  redis_data:
    name: ghost_redis_data

networks:
  ghost_network:
    name: ghost_network
  ghost_runtime:
    name: ghost_runtime
    # Runtime containers (workspace previews) attach to this network
